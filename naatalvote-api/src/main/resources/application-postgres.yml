spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/naatalvote}
    username: ${SPRING_DATASOURCE_USERNAME:naatalvote}
    password: ${SPRING_DATASOURCE_PASSWORD:naatalvote}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Africa/Dakar
  flyway:
    enabled: true
  data:
    redis:
      # Render Redis often provides a full URL; Spring will prefer `url` when set.
      url: ${SPRING_DATA_REDIS_URL:}
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
