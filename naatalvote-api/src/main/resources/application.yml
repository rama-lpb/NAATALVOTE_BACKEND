server:
  # Render exposes the port via $PORT. Default to 8080 for local/dev & Docker.
  port: ${PORT:8080}

spring:
  application:
    name: naatalvote-api
  profiles:
    default: inmemory
  jackson:
    time-zone: Africa/Dakar

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/v1/docs
  swagger-ui:
    path: /api/v1/swagger

naatalvote:
  cors:
    # Comma-separated list. Override in Render via env var NAATALVOTE_CORS_ALLOWED_ORIGINS.
    allowed-origins: ${NAATALVOTE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
